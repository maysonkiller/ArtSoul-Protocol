            try {
                var theme = localStorage.getItem('artsoul_theme') || 'classic';
                document.documentElement.classList.remove('classic', 'future');
                document.documentElement.classList.add(theme === 'future' ? 'future' : 'classic');
            } catch (error) {
                document.documentElement.classList.remove('classic', 'future');
                document.documentElement.classList.add('classic');
            }
        })();
    </script>

    <style>
body.classic,
        body.future {
            background: var(--c-bg);
            color: var(--c-text);
        }

        /* Gradient flow animation for Future mode */
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .future h1,
        .future h2,
        .future h3 {
            background: linear-gradient(90deg, var(--c-accent), var(--c-accent-2), var(--c-accent));
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 3s linear infinite;
        }

        /* Logo styles */
        .classic .site-logo {
            filter: drop-shadow(0 0 8px rgba(var(--c-accent-rgb), 0.4));
        }

        .future .site-logo {
            filter: drop-shadow(0 0 15px rgba(var(--c-accent-rgb), 0.6)) drop-shadow(0 0 30px rgba(var(--c-accent-2-rgb), 0.4));
        }

        /* Input styles */
        input, textarea {
            background: transparent;
            border: 1px solid currentColor;
            color: inherit;
            outline: none;
        }

        input:focus, textarea:focus {
            border-color: var(--c-border);
        }

        /* Glow pulse animation for Future mode */
        @keyframes glow-pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(var(--c-accent-rgb), 0.3);
            }
            50% {
                box-shadow: 0 0 30px rgba(var(--c-accent-rgb), 0.6), 0 0 40px rgba(var(--c-accent-2-rgb), 0.4);
            }
        }

        .auction-detail-panel,
        .bid-activity-panel,
        .new-auction-panel {
            background: var(--c-surface);
            border: 1px solid var(--c-border-soft);
            color: var(--c-text);
        }

        .new-auction-input {
            width: 100%;
            background: var(--c-surface-muted);
            border: 1px solid var(--c-border-soft);
            color: var(--c-text);
        }

        .new-auction-input:focus {
            border-color: var(--c-border);
            box-shadow: 0 0 0 2px var(--c-glow);
            outline: none;
        }

        .auction-duration-option {
            background: var(--c-surface-muted);
            border: 1px solid var(--c-border-soft);
            color: var(--c-text);
        }

        .auction-duration-option.is-active {
            background: rgba(var(--c-accent-rgb), 0.14);
            border-color: var(--c-border);
            color: var(--c-accent);
            box-shadow: 0 0 14px var(--c-glow);
        }

        .live-auction-pill {
            display: inline-flex;
            align-items: center;
            border: 1px solid var(--c-border);
            background: rgba(var(--c-accent-rgb), 0.12);
            color: var(--c-accent);
        }

        .bid-activity-row {
            background: var(--c-surface-muted);
            border: 1px solid var(--c-border-soft);
        }

        .bid-activity-row + .bid-activity-row {
            margin-top: 0.5rem;
        }

        .bidder-profile-link,
        .bid-activity-amount {
            color: var(--c-accent);
        }

        .bidder-profile-link:hover,
        .bidder-profile-link:focus-visible {
            color: var(--c-accent-2);
        }

        .bid-activity-empty {
            background: rgba(var(--c-accent-rgb), 0.06);
            border: 1px dashed var(--c-border-soft);
            color: var(--c-text);
        }

        .moderation-panel {
            background: var(--c-surface);
            border: 1px solid var(--c-border-soft);
            color: var(--c-text);
        }

        .moderation-state {
            background: rgba(var(--c-accent-rgb), 0.08);
            border: 1px solid var(--c-border-soft);
            color: var(--c-accent);
        }

        .moderation-reason {
            background: var(--c-surface-muted);
            border: 1px solid var(--c-border-soft);
            color: var(--c-text);
        }

        .moderation-reason:focus {
            border-color: var(--c-border);
            box-shadow: 0 0 0 2px var(--c-glow);
        }

        .moderation-action {
            background: rgba(var(--c-accent-rgb), 0.12);
            border: 1px solid var(--c-border);
            color: var(--c-accent);
        }

        .moderation-action:hover:not(:disabled),
        .moderation-action:focus-visible:not(:disabled) {
            background: rgba(var(--c-accent-rgb), 0.2);
            box-shadow: 0 0 18px var(--c-glow);
        }

        .moderation-action:disabled {
            cursor: not-allowed;
            opacity: 0.5;
        }
    </style>
