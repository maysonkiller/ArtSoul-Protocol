<script>
        (function() {
            try {
                var theme = localStorage.getItem('artsoul_theme') || 'classic';
                document.documentElement.classList.remove('classic', 'future');
                document.documentElement.classList.add(theme === 'future' ? 'future' : 'classic');
                if (/^0x[a-f0-9]{40}$/i.test(localStorage.getItem('artsoul_wallet') || '')) document.documentElement.classList.add('wallet-state-resolving');
            } catch (error) {
                document.documentElement.classList.remove('classic', 'future');
                document.documentElement.classList.add('classic');
            }
        })();
    </script>

            color: var(--c-text);

        @media (min-width: 769px) {

        }

        @media (max-width: 768px), (prefers-reduced-motion: reduce) {

    <style>
* {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @keyframes glow-pulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        .gallery-item {
            transition: all 0.3s ease;
        }

        /* Classic Mode */
        body.classic {
            background: var(--bg-classic);
            color: var(--text-classic);
        }

        /* Button styles moved to unified-styles.css */

        .classic .gallery-item:hover {
            transform: translateY(-8px);
            border-color: var(--accent-classic);
        }

        /* Future Mode */
        body.future {
            background: var(--c-bg);
            color: var(--accent-future);
        }

        /* Button hover effects moved to button-effects.css */

        .future .neon-glow {
            text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
            animation: glow-pulse 2s ease-in-out infinite;
        }

        .future .neon-border {
            box-shadow: 0 0 10px var(--accent-future), 0 0 20px var(--accent-future);
        }

        .future .gallery-item:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 0 15px var(--neon-purple), 0 0 30px var(--neon-purple);
        }

        /* Theme toggle styles moved to unified-styles.css */

/* Username gradient in Future mode */
        @keyframes gradientFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .future .avatar-info > div:first-child {
            background: linear-gradient(90deg, var(--accent-future), var(--neon-purple), var(--accent-future));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 3s linear infinite;
        }
    </style>
