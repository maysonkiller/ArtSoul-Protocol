<script>

            try {
                var theme = localStorage.getItem('artsoul_theme') || 'classic';
                document.documentElement.classList.remove('classic', 'future');
                document.documentElement.classList.add(theme === 'future' ? 'future' : 'classic');
            } catch (error) {
                document.documentElement.classList.remove('classic', 'future');
                document.documentElement.classList.add('classic');
            }
        })();
    </script>

    <script>
        (function() {
            const theme = localStorage.getItem('artsoul_theme') || 'classic';
            document.documentElement.classList.remove('classic', 'future');
            document.documentElement.classList.add(theme);
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    document.body.classList.remove('classic', 'future');
                    document.body.classList.add(theme);
                });
            } else {
                document.body.classList.remove('classic', 'future');
                    document.body.classList.add(theme);
            }
        })();
    </script>

    <style>
* {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body.classic {
            background: var(--bg-classic);
            color: var(--text-classic);
        }

        .classic header {
            background: rgba(1, 1, 1, 0.95);
            border-bottom: 1px solid var(--accent-classic);
        }

        body.future {
            background: var(--c-bg);
            color: var(--accent-future);
        }

        .future header {
            background: rgba(0, 0, 0, 0.8);
            border-bottom: 1px solid var(--accent-future);
            box-shadow: 0 0 20px rgba(var(--c-accent-rgb), 0.3);
        }

header {
            position: sticky;
            top: 0;
            z-index: 50;
            backdrop-filter: blur(12px);
        }

        header .container {
            padding-top: 0.75rem;
            padding-bottom: 0.75rem;
        }

        .future .timeline-line {
            background: linear-gradient(90deg, var(--accent-future) 0%, var(--neon-purple) 25%, var(--accent-future) 50%, var(--neon-purple) 75%, var(--accent-future) 100%);
            background-size: 200% 100%;
            animation: lineGlow 3s linear infinite;
        }

        @keyframes lineGlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .future .timeline-dot {
            animation: dotPulse 2s ease-in-out infinite;
            transform-origin: center center;
        }

        @keyframes dotPulse {
            0%, 100% { box-shadow: 0 0 10px var(--accent-future), 0 0 20px var(--neon-purple); }
            50% { box-shadow: 0 0 20px var(--accent-future), 0 0 40px var(--neon-purple); }
        }

        .future .relative.mb-12:nth-child(2) { animation: floatItem1 8s ease-in-out infinite; }
        .future .relative.mb-12:nth-child(3) { animation: floatItem2 10s ease-in-out infinite; }
        .future .relative.mb-12:nth-child(4) { animation: floatItem3 12s ease-in-out infinite; }
        .future .relative:nth-child(5) { animation: floatItem4 9s ease-in-out infinite; }

        @keyframes floatItem1 {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-15px) translateX(10px); }
            50% { transform: translateY(-8px) translateX(-5px); }
            75% { transform: translateY(-20px) translateX(8px); }
        }
        @keyframes floatItem2 {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-12px) translateX(-8px); }
            50% { transform: translateY(-18px) translateX(12px); }
            75% { transform: translateY(-5px) translateX(-10px); }
        }
        @keyframes floatItem3 {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-10px) translateX(15px); }
            50% { transform: translateY(-22px) translateX(-8px); }
            75% { transform: translateY(-12px) translateX(10px); }
        }
        @keyframes floatItem4 {
            0%, 100% { transform: translateY(0px) translateX(0px); }
            25% { transform: translateY(-18px) translateX(-12px); }
            50% { transform: translateY(-10px) translateX(15px); }
            75% { transform: translateY(-15px) translateX(-5px); }
        }

        .network-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .classic .network-badge {
            background: rgba(232, 227, 213, 0.1);
            border: 1px solid var(--accent-classic);
        }

        .future .network-badge {
            background: rgba(var(--c-accent-rgb), 0.1);
            border: 1px solid var(--accent-future);
            position: relative;
            overflow: hidden;
        }

        .future .network-badge::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(var(--c-accent-rgb), 0.3), transparent);
            animation: scanning 3s linear infinite;
        }

        @keyframes scanning {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        @media (max-width: 640px) {
            .network-badge {
                padding: 0.375rem 0.75rem;
                font-size: 0.75rem;
            }
        }

        .tooltip-wrap {
            position: relative;
            display: inline-block;
        }

        .tooltip-text {
            visibility: hidden;
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            white-space: nowrap;
            margin-bottom: 0.5rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .classic .tooltip-text {
            background: var(--text-classic);
            color: var(--bg-classic);
        }

        .future .tooltip-text {
            background: var(--accent-future);
            color: var(--c-bg);
        }

        .tooltip-wrap:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
        }

        .icon-svg {
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fadeIn {
            animation: fadeIn 0.6s ease-out forwards;
        }

        html {
            scroll-behavior: auto;
        }

        @keyframes neonPulse {
            0%, 100% {
                box-shadow: 0 0 10px var(--accent-future), 0 0 20px var(--accent-future);
                opacity: 1;
            }
            50% {
                box-shadow: 0 0 20px var(--accent-future), 0 0 40px var(--neon-purple);
                opacity: 0.8;
            }
        }

        @keyframes lineGlow {
            0%, 100% {
                background: linear-gradient(180deg, var(--accent-future) 0%, var(--neon-purple) 100%);
            }
            50% {
                background: linear-gradient(180deg, var(--neon-purple) 0%, var(--accent-future) 100%);
            }
        }

        .future .roadmap-dot {
            animation: neonPulse 2s ease-in-out infinite;
        }

        .future .roadmap-line {
            animation: lineGlow 3s ease-in-out infinite;
        }

        .devnet-banner {
            display: inline-flex;
            align-items: center;
            padding: 0.375rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 500;
            white-space: nowrap;
            text-decoration: none;
            transition: all 0.3s;
        }

        .classic .devnet-banner {
            background: rgba(var(--c-accent-rgb), 0.15);
            border: 1px solid var(--accent-classic);
            color: var(--accent-classic);
        }

        .classic .devnet-banner:hover {
            background: rgba(var(--c-accent-rgb), 0.25);
            border-color: var(--text-classic);
        }

        .future .devnet-banner {
            background: rgba(var(--c-accent-rgb), 0.15);
            border: 1px solid var(--accent-future);
            color: var(--accent-future);
        }

        .future .devnet-banner:hover {
            background: rgba(var(--c-accent-rgb), 0.25);
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(var(--c-accent-rgb), 0.3);
        }

        .close-button {
            transition: all 0.3s;
        }

        .classic .close-button,
        .classic .close-button:hover {
            border-color: var(--accent-classic) !important;
            color: var(--accent-classic) !important;
            background: transparent !important;
            box-shadow: none !important;
            filter: none !important;
            animation: none !important;
            text-shadow: none !important;
        }

        .future .close-button {
            border-color: var(--accent-future);
            color: var(--accent-future);
            box-shadow: 0 0 10px rgba(var(--c-accent-rgb), 0.3);
            animation: closeButtonPulse 2s ease-in-out infinite;
        }

        .future .close-button:hover {
            box-shadow: 0 0 20px var(--accent-future), 0 0 40px var(--neon-purple);
            animation: buttonGlow 1.5s ease-in-out infinite;
        }

        @keyframes closeButtonPulse {
            0%, 100% { box-shadow: 0 0 10px rgba(var(--c-accent-rgb), 0.3); }
            50% { box-shadow: 0 0 20px rgba(var(--c-accent-rgb), 0.5), 0 0 30px rgba(var(--c-accent-2-rgb), 0.3); }
        }

        @keyframes buttonGlow {
            0%, 100% {
                box-shadow: 0 0 20px var(--accent-future), 0 0 40px var(--neon-purple);
                border-color: var(--accent-future);
            }
            50% {
                box-shadow: 0 0 30px var(--neon-purple), 0 0 60px var(--accent-future);
                border-color: var(--neon-purple);
            }
        }

        .doc-section {
            cursor: pointer;
            transition: all 0.3s;
            border-radius: 1rem;
            overflow: hidden;
        }

        .doc-section h2 {
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            padding: 1rem 1.5rem;
        }

        .doc-section .toggle-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1rem;
            height: 1rem;
            flex: 0 0 auto;
            transition: transform 0.3s;
            font-size: 1rem;
        }

        .doc-section .content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, opacity 0.3s, padding 0.3s;
            opacity: 0;
            padding: 0 1.5rem;
        }

        .doc-section.open .content {
            max-height: 2000px;
            opacity: 1;
            padding: 0 1.5rem 1.5rem 1.5rem;
        }

        .doc-section.open .toggle-icon {
            transform: rotate(180deg);
        }

        .classic .doc-section {
            background: rgba(var(--c-accent-rgb), 0.05);
            border: 1px solid rgba(var(--c-accent-rgb), 0.2);
        }
        .classic .doc-section.open {
            border-color: var(--accent-classic);
            background: rgba(var(--c-accent-rgb), 0.1);
        }

        .future .doc-section {
            background: rgba(var(--c-accent-rgb), 0.05);
            border: 1px solid rgba(var(--c-accent-rgb), 0.2);
        }
        .future .doc-section.open {
            border-color: var(--accent-future);
            background: rgba(var(--c-accent-rgb), 0.1);
            box-shadow: 0 0 15px rgba(var(--c-accent-rgb), 0.2);
        }

        .roadmap-card {
            position: relative;
        }

        .roadmap-title {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
        }

        .roadmap-marker {
            width: 0.7rem;
            height: 0.7rem;
            border-radius: 9999px;
            flex: 0 0 auto;
        }

        .classic .roadmap-marker {
            background: var(--accent-classic);
        }

        .future .roadmap-card {
            overflow: hidden;
            animation: roadmapFloat 6s ease-in-out infinite;
        }

        .future .roadmap-card:nth-child(2) {
            animation-delay: 0.4s;
        }

        .future .roadmap-card:nth-child(3) {
            animation-delay: 0.8s;
        }

        .future .roadmap-card:nth-child(4) {
            animation-delay: 1.2s;
        }

        .future .roadmap-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent 20%, rgba(var(--c-accent-rgb), 0.18), transparent 80%);
            transform: translateX(-120%);
            animation: roadmapScan 4.5s linear infinite;
            pointer-events: none;
        }

        .future .roadmap-marker {
            background: var(--accent-future);
            box-shadow: 0 0 12px var(--accent-future), 0 0 24px var(--neon-purple);
            animation: neonPulse 2s ease-in-out infinite;
        }

        @keyframes roadmapFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @keyframes roadmapScan {
            0% { transform: translateX(-120%); }
            100% { transform: translateX(120%); }
        }

        .check-mark {
            display: inline-block;
            margin-right: 0.5rem;
        }

        .classic .check-mark.yes {
            color: var(--accent-classic);
        }

        .classic .check-mark.no {
            color: #ff6b6b;
        }

        .future .check-mark.yes {
            color: var(--accent-future);
            text-shadow: 0 0 10px var(--accent-future);
        }

        .future .check-mark.no {
            color: var(--neon-purple);
            text-shadow: 0 0 10px var(--neon-purple);
        }
    </style>
