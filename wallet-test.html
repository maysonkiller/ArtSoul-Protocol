<!DOCTYPE html>
<html lang="en" class="classic">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex,nofollow">
    <title>Wallet Connection Test</title>
    <link rel="stylesheet" href="unified-styles.css?v=31">
    <style>
        .wallet-test-page, .wallet-test-page * { box-sizing: border-box; }
        .wallet-test-page {
            min-height: 100vh;
            width: 100%;
            margin: 0;
            padding: 16px;
            overflow-x: hidden;
            color: var(--c-text);
            background: var(--c-bg);
            font-family: Inter, system-ui, sans-serif;
        }
        .wallet-test-shell {
            width: min(720px, 100%);
            margin: 0 auto;
            display: grid;
            gap: 12px;
        }
        .wallet-test-card {
            padding: 14px;
            border: 1px solid var(--c-border);
            border-radius: 12px;
            background: var(--c-surface);
        }
        .wallet-test-title { margin: 0 0 6px; font-size: 1.15rem; }
        .wallet-test-note { margin: 0; color: var(--c-text-muted); font-size: 0.84rem; }
        .wallet-test-status { margin-top: 10px; font: 0.78rem/1.45 ui-monospace, monospace; }
        #walletTestConnect {
            width: 100%;
            min-height: 48px;
            border: 1px solid var(--c-accent);
            border-radius: 10px;
            color: var(--c-text);
            background: var(--c-surface);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }
        #walletTestConnect:disabled { opacity: 0.65; cursor: wait; }
        #walletTestLog {
            min-height: 52vh;
            max-height: 62vh;
            overflow: auto;
            margin: 0;
            padding: 10px;
            border: 1px solid var(--c-border);
            border-radius: 10px;
            color: var(--c-text);
            background: var(--c-bg);
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            font: 0.72rem/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        }
    </style>
</head>
<body class="wallet-test-page">
    <main class="wallet-test-shell">
        <section class="wallet-test-card">
            <h1 class="wallet-test-title">Wallet connection isolation test</h1>
            <p class="wallet-test-note">Not linked from ArtSoul. No artwork, profile, Supabase, or contract code runs in the default bare layer.</p>
            <div id="walletTestStatus" class="wallet-test-status">Starting...</div>
        </section>
        <button id="walletTestConnect" type="button">Connect with bare AppKit</button>
        <pre id="walletTestLog" aria-live="polite"></pre>
    </main>
    <script type="module" src="wallet-test.js?v=1"></script>
</body>
</html>
