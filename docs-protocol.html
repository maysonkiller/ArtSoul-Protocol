<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function () {
            try {
                var theme = localStorage.getItem('artsoul_theme') || 'classic';
                document.documentElement.classList.add(theme === 'future' ? 'future' : 'classic');
                if (/^0x[a-f0-9]{40}$/i.test(localStorage.getItem('artsoul_wallet') || '')) document.documentElement.classList.add('wallet-state-resolving');
            } catch (error) {
                document.documentElement.classList.add('classic');
            }
        })();
    </script>
    <title>Protocol Docs | ArtSoul</title>
    <meta name="description" content="User documentation for ArtSoul discovery-first auctions, deposit-backed bidding, settlement, lazy minting, fees, trust, and provenance.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="ArtSoul">
    <meta property="og:title" content="ArtSoul Protocol Docs">
    <meta property="og:description" content="Learn how ArtSoul discovery-first auctions work from publishing through settlement and resale.">
    <meta property="og:image" content="https://artsoul.vercel.app/artsoul-social-preview.png?v=1">
    <meta property="og:url" content="https://artsoul.vercel.app/docs-protocol.html">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ArtSoul Protocol Docs">
    <meta name="twitter:description" content="Learn how ArtSoul discovery-first auctions work from publishing through settlement and resale.">
    <meta name="twitter:image" content="https://artsoul.vercel.app/artsoul-social-preview.png?v=1">
    <link rel="icon" type="image/jpeg" href="favicon.jpg?v=3">
    <link rel="apple-touch-icon" href="ARTSOULlogo.png?v=3">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="design-system.css?v=1">
    <link rel="stylesheet" href="unified-styles.css?v=31">
    <link rel="stylesheet" href="button-effects.css?v=5">
    <link rel="stylesheet" href="mobile-no-motion.css?v=2">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="src/ui/theme-manager.js"></script>
    <script src="modal-system.js"></script>
    <script type="module" src="supabase-client.js"></script>
    <script type="module" src="supabase-auth.js"></script>
    <script src="avatar-dropdown.js?v=24"></script>
    <!-- On-screen wallet debug overlay for mobile diagnosis; fetched only when wallet debug is enabled -->
    <script>
        (function () {
            try {
                var params = new URLSearchParams(location.search);
                var hashParams = new URLSearchParams((location.hash || '').replace(/^#/, ''));
                var flag = params.get('walletdebug') || params.get('walletDebug') ||
                    hashParams.get('walletdebug') || hashParams.get('walletDebug');
                if (flag === '0') return;
                if (flag !== '1' && localStorage.getItem('artsoul_wallet_debug') !== '1') return;
                var script = document.createElement('script');
                script.src = 'wallet-debug-overlay.js?v=2';
                document.head.appendChild(script);
            } catch (error) {
                // Diagnostics only - never block the page.
            }
        })();
    </script>
    <script type="module" src="appkit-init.js?v=32"></script>
</head>
<body>
    <header class="site-header">
        <div class="site-header-shell">
            <div class="site-header-row">
                <div class="site-header-logo-zone">
                    <a href="index.html" class="logo-link" aria-label="ArtSoul home">
                        <img src="ARTSOULlogo-clean.png" alt="ArtSoul" class="site-logo">
                    </a>
                </div>
                <div class="site-header-center page-context" aria-hidden="true"></div>
                <div class="site-header-actions">
                    <div id="networkBadge"></div>
                    <div id="navButtons" class="site-header-nav" data-avatar-render-key="initializing">
                        <div class="avatar-dropdown-container">
                            <button class="avatar-button" type="button" data-allow-rapid aria-label="ArtSoul account menu" aria-controls="avatarDropdownMenu" aria-expanded="false" onclick="window.AvatarDropdown?.toggle()">
                                <img data-avatar-image src="/default-avatar.png" alt="ArtSoul">
                                <div class="avatar-info"><div data-avatar-name>ArtSoul Guest</div><div data-avatar-address hidden aria-hidden="true"></div></div>
                                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" class="dropdown-arrow" aria-hidden="true"><path d="M4 6l4 4 4-4"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div id="app"></div>
    <script type="module" async src="/src/entries/docs-protocol.jsx"></script>
</body>
</html>
